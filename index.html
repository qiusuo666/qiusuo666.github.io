<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
</head>
<body>
    <!-- 壁纸层 -->
    <div class="wallpaper" id="wallpaper">
        <div class="wallpaper-img" id="wallpaperImg"></div>
        <div class="overlay"></div>
    </div>

    <!-- 主界面 -->
    <div class="main-view" id="mainView">
        <div class="clock-container">
            <div class="time" id="clockTime">00:00:00</div>
            <div class="date" id="clockDate">2026年1月1日 星期四</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <div class="search-engine-selector" id="engineSelector">
                    <div class="engine-current">
                        <img id="currentEngineIcon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'%3E%3Cpath d='M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z'/%3E%3C/svg%3E" alt="">
                        <span id="currentEngineName">Google</span>
                        <svg class="arrow-down" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                    <div class="engine-dropdown" id="engineDropdown"></div>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索..." autofocus>
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
            <div class="suggestions" id="suggestions"></div>
            <div class="search-history" id="searchHistory">
                <div class="history-header">
                    <span>搜索历史</span>
                    <button class="clear-history" id="clearHistory">清空</button>
                </div>
                <div class="history-tags" id="historyTags"></div>
            </div>
        </div>
    </div>

    <!-- 次级页面 -->
    <div class="links-view" id="linksView">
        <div class="links-header">
            <h2>快捷网址</h2>
            <button class="add-cat-btn" id="addCategoryBtn">+ 新建分类</button>
        </div>
        <div class="links-container" id="linksContainer"></div>
        <div class="links-footer-hint links-view-bg"></div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加快捷网址</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="linkForm">
                    <div class="form-group">
                        <label>网站名称</label>
                        <input type="text" class="form-input" id="linkName" placeholder="例如：GitHub" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>网址 (URL)</label>
                        <input type="text" class="form-input" id="linkUrl" placeholder="例如：https://github.com">
                    </div>
                </div>
                <div id="catForm" style="display:none;">
                    <div class="form-group">
                        <label>分类名称</label>
                        <input type="text" class="form-input" id="catNameInput" placeholder="例如：工作" maxlength="15">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="modalCancel">取消</button>
                <button class="btn btn-confirm" id="modalConfirm">添加</button>
            </div>
        </div>
    </div>

    <!-- 快捷栏（跨页面） -->
    <div class="favorites-bar" id="favoritesBar">
        <div class="favorites-label">★ 常用</div>
        <div class="favorites-track" id="favoritesTrack">
            <div class="fav-drop-hint" id="favDropHint">拖拽网址到此处</div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-items" id="contextItems"></div>
    </div>

    <!-- 背景设置按钮 -->
    <button class="bg-settings-btn" id="bgSettingsBtn" title="更换背景">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <path d="M2 12h4m12 0h4M12 2v4m0 12v4"/>
            <circle cx="6" cy="6" r="1" fill="currentColor"/>
            <circle cx="18" cy="18" r="1" fill="currentColor"/>
            <circle cx="18" cy="6" r="1" fill="currentColor"/>
            <circle cx="6" cy="18" r="1" fill="currentColor"/>
        </svg>
    </button>

    <!-- 背景选择面板 -->
    <div class="bg-panel" id="bgPanel">
        <div class="bg-panel-header">
            <span>更换背景</span>
            <button class="bg-panel-close" id="bgPanelClose">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="bg-panel-grid" id="bgPanelGrid">
            <!-- 由 JS 动态生成 -->
        </div>
        <div class="bg-panel-footer">
            <label class="bg-upload-btn">
                <span>+ 自定义图片</span>
                <input type="file" id="bgFileInput" accept="image/*" hidden>
            </label>
        </div>
    </div>

    <!-- 移动端：快捷网址入口 -->
    <button class="mobile-links-btn" id="mobileLinksBtn" title="快捷网址">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
    </button>

    <!-- 用户认证按钮 -->
    <button class="auth-btn" id="authBtn" title="登录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
    </button>

    <!-- 用户下拉菜单 -->
    <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-header">
            <span class="user-dropdown-name" id="userDropdownName"></span>
            <span class="user-dropdown-sync" id="userDropdownSync">○ 未同步</span>
        </div>
        <div class="user-dropdown-item" id="btnSyncUpload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            <span>上传到云端</span>
        </div>
        <div class="user-dropdown-item" id="btnSyncDownload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>从云端下载</span>
        </div>
        <div class="user-dropdown-divider"></div>
        <div class="user-dropdown-item danger" id="btnChangePassword">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>修改密码</span>
        </div>
        <div class="user-dropdown-item danger" id="btnSignOut">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>退出登录</span>
        </div>
    </div>

    <!-- 认证弹窗（登录/注册） -->
    <div class="auth-modal-overlay" id="authModalOverlay">
        <div class="auth-modal" id="authModal">
            <button class="auth-modal-close" id="authModalClose">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <div class="auth-modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h2 class="auth-modal-title" id="authModalTitle">登录</h2>
            <p class="auth-modal-subtitle" id="authModalSubtitle">登录后可在多端同步数据</p>
            <div class="auth-modal-body">
                <div class="auth-form-group">
                    <label>用户名</label>
                    <input type="text" class="auth-input" id="authUsername" placeholder="输入用户名" maxlength="30" autocomplete="username">
                </div>
                <div class="auth-form-group">
                    <label>密码</label>
                    <input type="password" class="auth-input" id="authPassword" placeholder="输入密码（至少6位）" maxlength="128" autocomplete="current-password">
                </div>
                <div class="auth-form-group" id="authConfirmPasswordGroup" style="display:none;">
                    <label>确认密码</label>
                    <input type="password" class="auth-input" id="authConfirmPassword" placeholder="再次输入密码" maxlength="128" autocomplete="new-password">
                </div>
                <div class="auth-form-group" id="authOldPasswordGroup" style="display:none;">
                    <label>旧密码</label>
                    <input type="password" class="auth-input" id="authOldPassword" placeholder="输入旧密码" maxlength="128">
                </div>
                <div class="auth-form-group" id="authNewPasswordGroup" style="display:none;">
                    <label>新密码</label>
                    <input type="password" class="auth-input" id="authNewPassword" placeholder="输入新密码（至少6位）" maxlength="128">
                </div>
                <label class="auth-remember" id="authRememberLabel">
                    <input type="checkbox" id="authRememberMe" checked>
                    <span>记住登录状态</span>
                </label>
                <div class="auth-error" id="authError"></div>
                <button class="auth-submit-btn" id="authSubmitBtn">登录</button>
                <div class="auth-switch" id="authSwitch">
                    <span id="authSwitchText">还没有账号？</span>
                    <button class="auth-switch-btn" id="authSwitchBtn">注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 同步状态提示 -->
    <div class="sync-toast" id="syncToast"></div>

    <!-- 光标画布 -->
    <canvas id="cursorCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
